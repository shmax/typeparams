name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag (e.g., latest, next, rc)'
        required: false
        default: 'next'
  push:
    tags:
      - '[0-9]*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      PUBLISH_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || 'next' }}

    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "yarn"
          registry-url: 'https://registry.npmjs.org'

      # Ensure the package scope resolves to npmjs.org in CI.
      - name: Configure npm registry
        run: |
          npm config set @shmax-org:registry https://registry.npmjs.org/
          npm config set registry https://registry.npmjs.org/

      # Install dependencies
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Build the project
      - name: Build project
        run: yarn build

      - name: Verify npm registry
        run: |
          npm config get registry
          npm config get @shmax-org:registry

      # Publish to npm
      - name: Publish to npm
        run: npm publish --provenance --access public --tag $PUBLISH_TAG --registry https://registry.npmjs.org/


